<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>播客工坊 · Podcast Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
<style>
:root{--white:#fff;--bg:#fafbfc;--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;--primary-ghost:rgba(37,99,235,.06);--primary-glow:rgba(37,99,235,.15);--text-primary:#111827;--text-secondary:#6b7280;--text-tertiary:#9ca3af;--border:#e5e7eb;--radius-md:12px;--radius-full:9999px;--font:'Inter',sans-serif;--transition:.25s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.5}
.app{display:flex;height:100vh;width:100vw;overflow:hidden}
.panel-left{width:36%;min-width:340px;height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-left-inner{padding:24px 20px;display:flex;flex-direction:column;height:100%;overflow:hidden}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-shrink:0}
.brand-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),#7c3aed);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.brand-text{font-size:16px;font-weight:600}
.brand-text span{color:var(--primary)}
.model-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;background:var(--primary-light);color:var(--primary-dark);margin-left:6px}
.search-section{flex-shrink:0;margin-bottom:16px}
.search-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.search-bar{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:0 4px 0 12px}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);background:var(--white)}
.search-bar input{flex:1;border:none;background:transparent;padding:10px 0;font-size:13px;font-family:var(--font);color:var(--text-primary);outline:none}
.search-bar input::placeholder{color:var(--text-tertiary)}
.search-btn{width:34px;height:34px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);flex-shrink:0}
.search-btn:hover{color:var(--primary);background:var(--primary-ghost)}
.results-area{flex:1;overflow-y:auto;min-height:0;padding-right:4px}
.results-area::-webkit-scrollbar{width:4px}
.results-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;color:var(--text-tertiary);height:100%}
.empty-state svg{width:44px;height:44px;margin-bottom:10px}
.empty-state h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text-secondary)}
.empty-state p{font-size:12px}
.news-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:10px}
.news-card.selected{border-color:var(--primary);background:#f8faff;box-shadow:0 0 0 1px var(--primary)}
.news-card .source{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:4px}
.news-card h4{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px}
.news-card .desc{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px}
.news-card .card-footer{display:flex;justify-content:space-between;align-items:center}
.news-card .news-link{font-size:11px;color:var(--primary);text-decoration:none}
.news-card .select-btn{padding:5px 16px;border:1.5px solid var(--primary);background:transparent;color:var(--primary);border-radius:var(--radius-full);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.news-card .select-btn.selected{background:var(--primary);color:#fff}
.panel-right{flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.panel-right-inner{padding:24px 28px;display:flex;flex-direction:column;height:100%;overflow:hidden;max-width:900px;width:100%;margin:0 auto}
.right-header{flex-shrink:0;margin-bottom:16px}
.right-header h2{font-size:20px;font-weight:600}
.right-header h2 span{color:var(--primary)}
.script-section{flex:1;display:flex;flex-direction:column;min-height:0;margin-bottom:12px}
.script-box{flex:1;min-height:140px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;font-size:13px;line-height:1.7;font-family:monospace;white-space:pre-wrap;width:100%;outline:none;resize:none}
.script-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.script-gen-btn,.script-dl-btn{padding:7px 18px;border-radius:var(--radius-md);font-size:12px;font-weight:500;cursor:pointer}
.script-gen-btn{border:none;background:var(--primary);color:#fff}
.script-gen-btn:disabled{opacity:.4}
.script-dl-btn{border:1.5px solid var(--primary);background:transparent;color:var(--primary);text-decoration:none}
.voice-section{flex-shrink:0;margin-bottom:12px}
.voice-section .section-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.hint-box{font-size:11px;color:var(--text-tertiary);margin-bottom:8px;padding:8px;background:#f0f5ff;border-radius:6px}
.host-box{border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;margin-bottom:8px}
.host-title{font-size:12px;font-weight:600;margin-bottom:6px}
.toggle-group{display:flex;gap:10px;margin-bottom:6px}
.toggle-group label{font-size:12px;cursor:pointer}
.gen-btn{padding:8px 20px;border:none;background:var(--primary);color:#fff;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer}
.gen-btn:disabled{opacity:.4}
.gen-btn.loading{color:transparent;position:relative}
.gen-btn.loading::after{content:'';position:absolute;inset:0;margin:auto;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.audio-section{flex-shrink:0;margin-bottom:12px;display:none}
.audio-section.visible{display:block}
.audio-player-wrapper{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--primary-ghost);border-radius:var(--radius-md)}
.audio-player-wrapper audio{flex:1;height:38px}
.download-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1.5px solid var(--primary);border-radius:var(--radius-full);font-size:12px;color:var(--primary);text-decoration:none}
.download-btn:hover{background:var(--primary);color:#fff}
.status-msg{font-size:11px;padding:6px 10px;border-radius:6px;margin-top:6px;display:none}
.status-msg.visible{display:block}
.status-msg.info{background:var(--primary-light);color:var(--primary-dark)}
.status-msg.error{background:#fef2f2;color:#dc2626}
.status-msg.success{background:#f0fdf4;color:#16a34a}
.config-section{margin-top:auto;flex-shrink:0;padding-top:12px;border-top:1px solid var(--border)}
.config-toggle{background:none;border:none;font-size:11px;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0}
.config-toggle svg{width:12px;height:12px;transition:transform .2s}
.search-btn svg{width:16px;height:16px}
.download-btn svg{width:14px;height:14px}
.config-toggle.open svg{transform:rotate(180deg)}
.config-body{margin-top:8px;display:none;flex-direction:column;gap:8px}
.config-body.open{display:flex}
.config-field{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.config-field label{font-size:11px;font-weight:500;color:var(--text-secondary);min-width:80px}
.config-field input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px}
.config-field .save-btn{padding:6px 12px;border:none;background:var(--primary);color:#fff;border-radius:6px;font-size:11px;cursor:pointer}
.config-hint{font-size:10px;color:var(--text-tertiary);line-height:1.4}
.subtitle{font-size:12px;color:var(--text-secondary);margin-top:4px}
.loading-state,.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:10px;color:var(--text-tertiary)}
.error-state p{font-size:13px;color:#dc2626}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
.retry-btn{padding:6px 16px;border:1px solid var(--border);background:var(--white);border-radius:var(--radius-full);font-size:12px;cursor:pointer;color:var(--text-secondary)}
.retry-btn:hover{border-color:var(--primary);color:var(--primary)}
.host-row{display:flex;gap:8px}
.host-box{flex:1;min-width:0}
.voice-desc{width:100%;padding:6px 8px;margin-bottom:6px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--font);outline:none}
.voice-desc:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-glow)}
.ref-audio{font-size:11px;max-width:100%}
.upload-area{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.clear-audio{padding:3px 8px;border:1px solid #dc2626;color:#dc2626;background:transparent;border-radius:4px;font-size:10px;cursor:pointer}
.audio-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.news-card{animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">
<div class="panel-left"><div class="panel-left-inner">
<div class="brand">
  <div class="brand-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
  <div class="brand-text">播客<span>工坊</span></div>
  <span class="model-badge" id="modelBadge">加载中</span>
</div>
<div class="search-section">
  <label class="search-label" for="topicInput">搜索领域动态</label>
  <div class="search-bar">
    <input id="topicInput" type="text" placeholder="大模型、AI 芯片、量子计算..." autocomplete="off" />
    <button class="search-btn" id="searchBtn" aria-label="搜索"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  </div>
</div>
<div class="results-area" id="resultsArea">
  <div class="empty-state" id="emptyState"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><h3>输入关键词开始探索</h3><p>获取全球最新新闻</p></div>
  <div class="loading-state" id="loadingState" style="display:none"><div class="spinner"></div><p style="font-size:12px">正在搜索...</p></div>
  <div class="error-state" id="errorState" style="display:none"><p id="errorMsg"></p><button class="retry-btn" id="retryBtn">重新搜索</button></div>
  <div id="cardsContainer" style="display:none"></div>
</div>
<div class="config-section">
  <button class="config-toggle" id="configToggle" aria-label="配置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>API 配置</button>
  <div class="config-body" id="configBody">
    <div class="config-field"><label>NewsAPI Key</label><input type="text" id="newsapiKeyInput" placeholder="Key" /><button class="save-btn" data-key="newsapi">保存</button></div>
    <div class="config-field"><label>DeepSeek Key</label><input type="text" id="deepseekKeyInput" placeholder="可选" /><button class="save-btn" data-key="deepseek">保存</button></div>
    <div class="config-hint"><strong>NewsAPI</strong>: newsapi.org 注册获取</div>
  </div>
</div>
</div></div>

<div class="panel-right"><div class="panel-right-inner">
<div class="right-header"><h2>播客 <span>工坊</span></h2><div class="subtitle">生成双人播客文案 → 合成多音色音频</div></div>

<div class="script-section">
  <label class="section-label">🎯 播客文案</label>
  <textarea class="script-box" id="scriptBox" placeholder="先在左侧选择新闻，点击「生成播客文案」后可直接编辑修改"></textarea>
  <div class="script-actions">
    <button class="script-gen-btn" id="genScriptBtn" disabled>生成播客文案</button>
    <a class="script-dl-btn" id="dlScriptBtn" style="display:none" download="podcast_script.txt">📄 下载 .txt</a>
    <button class="gen-btn" id="genDualBtn" disabled style="display:none">🎙️ 生成播客音频</button>
  </div>
</div>

<div class="voice-section">
  <label class="section-label" id="voiceSectionLabel">🎙️ 主播音色设置</label>
  <div id="voxcpm2Config" style="display:none">
    <div class="hint-box">💡 音色设置：<b>不上传</b>参考音频时，可用「音色描述」文字生成音色；<b>上传</b>参考音频则克隆该音色，描述用于微调风格（语速/情绪）。</div>
    <div class="host-row">
    <div class="host-box">
      <div class="host-title">主播 A</div>
      <input type="text" class="voice-desc" placeholder="音色描述（可选）：低沉磁性的中年男主播" />
      <div class="upload-area"><input type="file" class="ref-audio" accept="audio/*" /><button class="clear-audio" style="display:none">删除</button></div>
    </div>
    <div class="host-box">
      <div class="host-title">主播 B</div>
      <input type="text" class="voice-desc" placeholder="音色描述（可选）：温柔亲切的年轻女主播" />
      <div class="upload-area"><input type="file" class="ref-audio" accept="audio/*" /><button class="clear-audio" style="display:none">删除</button></div>
    </div>
    </div>
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<div class="audio-section" id="audioSection">
  <div class="audio-label">生成的播客音频</div>
  <div class="audio-player-wrapper">
    <audio id="audioPlayer" controls preload="metadata"></audio>
    <a class="download-btn" id="downloadBtn" download="podcast_dual.wav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载</a>
  </div>
</div>
</div></div>
</div>

<script>
(function(){
'use strict';
const LS=localStorage;
const state={apiKeys:{newsapi:LS.getItem('podcast_newsapi_key')||'',deepseek:LS.getItem('podcast_deepseek_key')||''},model:'',ttsReady:false,searchResults:[],selectedNews:null,audioUrl:null,isSearching:false,isGeneratingScript:false,isGeneratingDual:false};
const $=s=>document.querySelector(s);
const ti=$('#topicInput'),sb=$('#searchBtn'),es=$('#emptyState'),ls=$('#loadingState'),ers=$('#errorState'),em=$('#errorMsg'),rt=$('#retryBtn'),cc=$('#cardsContainer'),sx=$('#scriptBox'),gs=$('#genScriptBtn'),ds=$('#dlScriptBtn'),gd=$('#genDualBtn'),sm=$('#statusMsg'),as=$('#audioSection'),ap=$('#audioPlayer'),db=$('#downloadBtn'),ct=$('#configToggle'),cb=$('#configBody'),nk=$('#newsapiKeyInput'),dk=$('#deepseekKeyInput'),mb=$('#modelBadge'),vsl=$('#voiceSectionLabel'),vs=$('.voice-section');
function se(m,t){sm.textContent=m;sm.className='status-msg visible '+t}
function cl(){sm.className='status-msg';sm.textContent=''}
function ha(){as.classList.remove('visible');if(state.audioUrl){URL.revokeObjectURL(state.audioUrl);state.audioUrl=null}ap.removeAttribute('src');db.removeAttribute('href')}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function lc(){nk.value=state.apiKeys.newsapi;dk.value=state.apiKeys.deepseek}
ct.addEventListener('click',function(){cb.classList.toggle('open');this.classList.toggle('open')});
document.querySelectorAll('.save-btn').forEach(function(b){b.addEventListener('click',function(){
var k=this.dataset.key;
if(k==='newsapi'){var v=nk.value.trim();state.apiKeys.newsapi=v;LS.setItem('podcast_newsapi_key',v);se('Key 已保存','success');setTimeout(cl,2000)}
if(k==='deepseek'){var v=dk.value.trim();state.apiKeys.deepseek=v;LS.setItem('podcast_deepseek_key',v);se('DeepSeek Key 已保存','success');setTimeout(cl,2000)}
})});

async function sn(topic){
if(!topic.trim()||state.isSearching)return;
var key=state.apiKeys.newsapi;
if(!key){es.style.display='flex';ers.style.display='none';em.textContent='请先配置 NewsAPI Key';return}
state.isSearching=true;sb.style.pointerEvents='none';es.style.display='none';ls.style.display='flex';ers.style.display='none';cc.style.display='none';
try{
var res=await fetch('/search_news',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:topic.trim(),api_key:key})});
var data=await res.json();
if(!res.ok)throw new Error(data.error||'搜索失败');
if(data.status==='error')throw new Error(data.message||'错误');
if(!data.articles||!data.articles.length){em.textContent='未找到相关新闻';es.style.display='none';ls.style.display='none';ers.style.display='flex';state.searchResults=[];return}
state.searchResults=data.articles.slice(0,3);
cc.innerHTML='';
state.searchResults.forEach(function(a,i){
var c=document.createElement('div');c.className='news-card';c.style.animationDelay=(i*0.1)+'s';
var src=a.source?.name||'',t=a.title||'',d=a.description?((a.description.length>120?a.description.slice(0,120)+'...':a.description)):'',u=a.url||'',sel=state.selectedNews===a;
c.innerHTML='<div class="source">'+esc(src)+'</div><h4>'+esc(t)+'</h4>'+(d?'<div class="desc">'+esc(d)+'</div>':'')+'<div class="card-footer">'+(u?'<a class="news-link" href="'+esc(u)+'" target="_blank">🔗 原文</a>':'<span></span>')+'<button class="select-btn'+(sel?' selected':'')+'">'+(sel?'已选中':'选这条')+'</button></div>';
c.querySelector('.select-btn').addEventListener('click',function(e){e.stopPropagation();
state.selectedNews=a;state.podcastScript=null;ha();cl();sx.value='';sx.placeholder='已选择';ds.style.display='none';gs.disabled=false;gd.disabled=true;
cc.querySelectorAll('.select-btn').forEach(function(x,i){var s2=state.selectedNews===state.searchResults[i];x.textContent=s2?'已选中':'选这条';x.classList.toggle('selected',s2)});
});
cc.appendChild(c);
});
es.style.display='none';ls.style.display='none';ers.style.display='none';cc.style.display='block';
}catch(err){em.textContent=err.message||'搜索失败';es.style.display='none';ls.style.display='none';ers.style.display='flex';state.searchResults=[]}
state.isSearching=false;sb.style.pointerEvents='';
}
sb.addEventListener('click',function(){sn(ti.value)});
ti.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sn(ti.value)}});
rt.addEventListener('click',function(){sn(ti.value)});

gs.addEventListener('click',async function(){
if(state.isGeneratingScript||!state.selectedNews)return;
state.isGeneratingScript=true;gs.disabled=true;
if(state.model==='VoxCPM-0.5B'){
gs.textContent='生成中...';var hasAi=!!state.apiKeys.deepseek;
if(hasAi)se('🤖 DeepSeek 总结...','info');
try{
var res=await fetch('/generate_summary',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article:state.selectedNews,api_key:state.apiKeys.deepseek})});
var data=await res.json();
if(!res.ok)throw new Error(data.error||'失败');
sx.value=data.script;sx.placeholder='';
ds.style.display='inline-flex';ds.href='data:text/plain;charset=utf-8,'+encodeURIComponent(data.script);
gd.disabled=false;se('✅ 摘要已生成','success');setTimeout(cl,3000);
}catch(err){se('生成失败：'+err.message,'error')}
state.isGeneratingScript=false;gs.disabled=false;gs.textContent='生成新闻摘要';return;
}
var hasAi=!!state.apiKeys.deepseek;gs.textContent=hasAi?'AI 生成中...':'生成中...';
if(hasAi)se('🤖 DeepSeek 生成对话...','info');
try{
var res=await fetch('/generate_script_v2',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article:state.selectedNews,api_key:state.apiKeys.deepseek})});
var data=await res.json();
if(!res.ok)throw new Error(data.error||'失败');
sx.value=data.script;sx.placeholder='';
ds.style.display='inline-flex';ds.href='data:text/plain;charset=utf-8,'+encodeURIComponent(data.script);
gd.disabled=false;se('✅ 文案已生成','success');setTimeout(cl,3000);
}catch(err){se('生成失败：'+err.message,'error')}
state.isGeneratingScript=false;gs.disabled=false;gs.textContent=state.model==='VoxCPM-0.5B'?'生成新闻摘要':'生成播客文案';
});

ds.addEventListener('click',function(){this.href='data:text/plain;charset=utf-8,'+encodeURIComponent(sx.value)});

gd.addEventListener('click',async function(){
if(state.isGeneratingDual||!sx.value)return;
state.isGeneratingDual=true;gd.disabled=true;gd.classList.add('loading');gd.textContent='合成中...';ha();
for(var t=0;t<200;t++){try{var sr=await fetch('/status');var st=await sr.json();if(st.status==='ready')break;se('⏳ 模型加载中...','info')}catch(e){}await new Promise(function(r){setTimeout(r,3000)})}
se('🎤 合成语音...','info');
try{
if(state.model==='VoxCPM-0.5B'){
var res=await fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:sx.value,voice_desc:''})});
}else{
var boxes=document.querySelectorAll('#voxcpm2Config .host-box');
var va=boxes[0]?.querySelector('.voice-desc')?.value.trim()||'',vb=boxes[1]?.querySelector('.voice-desc')?.value.trim()||'';
var fd=new FormData();fd.append('script',sx.value);fd.append('voice_a',va);fd.append('voice_b',vb);
var ra=boxes[0]?.querySelector('.ref-audio'),rb=boxes[1]?.querySelector('.ref-audio');
if(ra&&ra.files[0])fd.append('ref_a',ra.files[0]);if(rb&&rb.files[0])fd.append('ref_b',rb.files[0]);
var res=await fetch('/generate_dual_tts',{method:'POST',body:fd});
}

if(!res.ok){var ed;try{ed=await res.json()}catch(e){}throw new Error(ed?.error||'失败')}
var blob=await res.blob();var url=URL.createObjectURL(blob);
state.audioUrl=url;as.classList.add('visible');ap.src=url;ap.load();db.href=url;
se('✅ 音频已生成','success');setTimeout(cl,3000);
}catch(err){se('生成失败：'+err.message,'error')}
state.isGeneratingDual=false;gd.disabled=false;gd.classList.remove('loading');gd.textContent='🎙️ 生成播客音频';

});

// VoxCPM2 UI 控制：参考音频选择/删除
document.querySelectorAll('.host-box').forEach(function(box){
var fi=box.querySelector('.ref-audio'),dl=box.querySelector('.clear-audio');
if(fi&&dl){fi.addEventListener('change',function(){dl.style.display=this.files[0]?'inline-block':'none'});
dl.addEventListener('click',function(){fi.value='';dl.style.display='none'})}
});

(function init(){
var cs=function(){
fetch('/status').then(function(r){return r.json()}).then(function(d){
state.ttsReady=d.status==='ready';state.model=d.model||'';mb.textContent=d.model||'?';
if(d.status==='loading'){se('⏳ '+(d.progress||'加载中...'),'info');gd.style.display='none';setTimeout(cs,3000)}
else if(d.status==='ready'){se('✅ '+d.model+' 已就绪','success');setTimeout(cl,5000);mb.textContent=d.model+' ✓';gd.style.display='inline-flex'}
if(d.model==='VoxCPM-0.5B'){vsl.textContent='';vs.style.display='none';gs.textContent='生成新闻摘要'}
else{vsl.textContent='🎙️ 主播音色设置';vs.style.display='block';document.getElementById('voxcpm2Config').style.display='block'}
}).catch(function(){});
};
cs();lc();
})();
})();
</script>
</body>
</html>
